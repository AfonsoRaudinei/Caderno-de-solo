<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recomendacao · SoloForte</title>
<style>
  :root {
    --blue:#007AFF;--blue-dark:#0051D5;--green:#34C759;--red:#FF3B30;
    --orange:#FF9500;--yellow:#FFD60A;--purple:#AF52DE;--teal:#5AC8FA;
    --indigo:#5856D6;--ink:#1D1D1F;--ink2:#3C3C43;--ink3:#86868B;
    --ink4:#C7C7CC;--border:#D1D1D6;--border-soft:#E5E5E7;
    --bg:#F5F5F7;--bg2:#FFFFFF;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.04);
    --shadow-lg:0 4px 20px rgba(0,0,0,.09),0 16px 48px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif;
    background:linear-gradient(180deg,#F5F5F7 0%,#EFEFF4 100%);
    color:var(--ink);font-size:15px;line-height:1.55;
    min-height:100vh;padding-bottom:64px;
    -webkit-font-smoothing:antialiased;
  }
  .hero{
    background:linear-gradient(135deg,#007AFF 0%,#0051D5 100%);
    color:#fff;padding:36px 24px 72px;text-align:center;position:relative;overflow:hidden;
  }
  .hero::after{
    content:'';position:absolute;left:50%;bottom:-32px;transform:translateX(-50%);
    width:130%;height:64px;
    background:linear-gradient(180deg,#EFEFF4 0%,#F5F5F7 100%);
    border-radius:50% 50% 0 0;
  }
  .hero-brand{font-size:18px;font-weight:700;letter-spacing:.3px;line-height:1.3;}
  .hero-sub{font-size:13px;font-weight:500;opacity:.75;margin-top:2px;}
  .container{max-width:720px;margin:0 auto;padding:0 16px;}
  .consult-card{
    background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);
    margin-top:-40px;position:relative;z-index:2;overflow:hidden;
  }
  .consult-top{
    display:flex;align-items:center;gap:16px;
    padding:20px 24px;border-bottom:1px solid var(--border-soft);
  }
  .logo-ph{
    width:56px;height:56px;border-radius:14px;
    background:linear-gradient(135deg,#E8E8EC,#D6D6DA);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;border:1.5px dashed var(--border);
    overflow:hidden;
  }
  .logo-ph img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
  .c-name{font-size:16px;font-weight:700;color:var(--ink);}
  .c-crea{font-size:12px;color:var(--ink3);margin-top:2px;}
  .c-badge{
    margin-left:auto;background:rgba(0,122,255,.08);
    border:1px solid rgba(0,122,255,.18);border-radius:10px;
    padding:6px 12px;font-size:11px;font-weight:600;color:var(--blue);
    flex-shrink:0;text-align:center;line-height:1.3;
  }
  .info-grid{display:grid;grid-template-columns:1fr 1fr;}
  .info-cell{padding:12px 20px;border-bottom:1px solid var(--border-soft);}
  .info-cell:nth-child(odd){border-right:1px solid var(--border-soft);}
  .info-cell:nth-last-child(-n+2){border-bottom:none;}
  .info-lbl{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--ink3);margin-bottom:3px;}
  .info-val{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3;}
  .info-val .sm{font-size:12px;font-weight:500;color:var(--ink3);}
  .section{margin-top:52px;}
  .section-num{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--blue);text-transform:uppercase;margin-bottom:3px;}
  .section-title{font-size:24px;font-weight:700;letter-spacing:-.4px;color:var(--ink);margin-bottom:6px;}
  .section-desc{font-size:13px;color:var(--ink3);margin-bottom:18px;line-height:1.5;}
  .big-card{background:#fff;border-radius:20px;box-shadow:var(--shadow);padding:24px;overflow:hidden;}
  .big-card+.big-card{margin-top:14px;}
  .metric-hero{display:flex;align-items:flex-end;gap:12px;margin-bottom:4px;}
  .metric-num{font-size:48px;font-weight:700;line-height:1;letter-spacing:-1.5px;}
  .metric-unit{font-size:14px;color:var(--ink3);font-weight:500;padding-bottom:6px;}
  .pill{display:inline-block;padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;letter-spacing:.2px;}
  .pill-red{background:#FFEBEE;color:#C62828;}
  .pill-orange{background:#FFF3E0;color:#E65100;}
  .pill-yellow{background:#FFFDE7;color:#B58900;}
  .pill-green{background:#E8F5E9;color:#2E7D32;}
  .pill-blue{background:rgba(0,122,255,.10);color:var(--blue);}
  .grad-wrap{margin:18px 0 6px;}
  .grad-bar{position:relative;height:10px;border-radius:5px;background:linear-gradient(90deg,#FF3B30 0%,#FF9500 25%,#FFD60A 50%,#34C759 75%,#007AFF 100%);}
  .grad-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;background:#1D1D1F;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.25);}
  .grad-scale{display:flex;justify-content:space-between;font-size:10px;color:var(--ink4);margin-top:8px;font-weight:500;}
  .dose-block{background:var(--bg);border-radius:14px;padding:18px 20px;margin-top:20px;display:flex;align-items:baseline;gap:10px;}
  .dose-lbl{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;}
  .dose-num{font-size:32px;font-weight:700;letter-spacing:-.8px;margin-left:auto;}
  .dose-unit{font-size:13px;color:var(--ink3);padding-bottom:3px;}
  .kv-list{margin-top:16px;}
  .kv{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border-soft);font-size:13px;}
  .kv:last-child{border-bottom:none;}
  .kv-l{color:var(--ink3);}
  .kv-v{font-weight:600;color:var(--ink);}
  .kv-arrow{color:var(--ink4);margin:0 6px;}
  .vrow{display:flex;align-items:center;gap:14px;padding:16px;background:var(--bg);border-radius:14px;margin-top:20px;}
  .vrow-item{flex:1;text-align:center;}
  .vrow-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600;}
  .vrow-num{font-size:24px;font-weight:700;}
  .parc{background:var(--bg);border-radius:14px;padding:16px 20px;margin-top:18px;}
  .parc-head{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;}
  .parc-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px;}
  .parc-row:last-child{border-bottom:none;}
  .parc-pct{color:var(--blue);font-weight:700;}
  .ba-legend{display:flex;gap:18px;margin-bottom:18px;font-size:11px;color:var(--ink3);font-weight:500;}
  .ba-legend span{display:flex;align-items:center;gap:6px;}
  .ba-dot{width:10px;height:10px;border-radius:3px;}
  .ba{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .ba-group{text-align:center;}
  .ba-bars-pair{display:flex;gap:5px;align-items:flex-end;justify-content:center;height:110px;}
  .ba-bar{width:26px;border-radius:4px 4px 0 0;position:relative;}
  .ba-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--ink2);white-space:nowrap;}
  .ba-name{font-size:12px;color:var(--ink2);font-weight:600;margin-top:8px;}
  .ba-note{font-size:11px;color:var(--ink4);text-align:center;margin-top:14px;font-style:italic;}
  .radar-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;}
  svg.radar{overflow:visible;}
  .micro-card{background:var(--bg);border-radius:14px;padding:16px 18px;margin-bottom:12px;}
  .micro-card:last-child{margin-bottom:0;}
  .micro-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
  .micro-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
  .micro-name{font-size:17px;font-weight:700;color:var(--ink);}
  .micro-status-pill{margin-left:4px;}
  .micro-val{margin-left:auto;font-size:14px;font-weight:600;color:var(--ink2);}
  .micro-val .u{font-size:11px;color:var(--ink3);font-weight:400;}
  .micro-nc{font-size:11px;color:var(--ink3);margin-bottom:8px;}
  .micro-doses{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:12px;border-radius:10px;overflow:hidden;border:1px solid var(--border-soft);}
  .micro-dose{padding:10px 14px;background:#fff;}
  .micro-dose:first-child{border-right:1px solid var(--border-soft);}
  .micro-dose-l{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px;}
  .micro-dose-v{font-size:14px;color:var(--ink);font-weight:600;}
  .micro-dose-v.na{color:var(--ink4);font-style:italic;font-size:12px;}
  .micro-warn{font-size:11px;color:var(--orange);margin-top:8px;}
  .warn{background:#FFF8E8;border-left:3px solid var(--orange);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:#5C3A00;line-height:1.5;}
  .warn:last-child{margin-bottom:0;}
  .footer{text-align:center;margin-top:56px;padding:20px;font-size:11px;color:var(--ink4);line-height:1.7;}
  .footer strong{color:var(--ink3);font-weight:600;}
  @media print{body{background:#fff;}.big-card,.consult-card{box-shadow:none;border:1px solid var(--border-soft);}.hero{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
  @media(max-width:440px){.info-grid{grid-template-columns:1fr;}.info-cell:nth-child(odd){border-right:none;}.ba{grid-template-columns:1fr 1fr;}.metric-num{font-size:40px;}.consult-top{flex-wrap:wrap;}.c-badge{margin-left:0;}}
</style>
</head>
<body>
{{BODY}}
</body>
</html>
